backend:
  name: github
  repo: CKMdubrovnik/korak-web
  branch: main
  base_url: https://brilliant-speculoos-aaf9c3.netlify.app
  auth_endpoint: .netlify/functions/auth

# Pristup uređivanju ide preko prijave GitHub računom.
# Tko smije uređivati kontrolira se dodavanjem/uklanjanjem članova
# u GitHub organizaciji CKMdubrovnik (Settings -> Collaborators and teams).
# OAuth posrednik: netlify/functions/auth.js i callback.js (potrebne env varijable
# OAUTH_CLIENT_ID i OAUTH_CLIENT_SECRET iz GitHub OAuth App-a).

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: "hr"

collections:
  - name: "site"
    label: "Sadržaj web stranice"
    files:
      - file: "content/site.json"
        label: "KORAK Dubrovnik — cijeli sadržaj"
        name: "site"
        fields:
          - label: "Naslovnica (hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Značka iznad naslova", name: "badge", widget: "string" }
              - { label: "Naslov — 1. redak", name: "title_line1", widget: "string" }
              - { label: "Naslov — 2. redak", name: "title_line2", widget: "string" }
              - { label: "Naslov — 3. redak (istaknuta zelena boja)", name: "title_line3", widget: "string" }
              - { label: "Uvodni tekst", name: "lead", widget: "text" }
              - { label: "Tekst glavnog gumba", name: "cta_primary", widget: "string" }
              - { label: "Tekst drugog gumba", name: "cta_secondary", widget: "string" }
              - label: "Kartice s desne strane naslovnice"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Ikona (emoji)", name: "icon", widget: "string" }
                  - { label: "Tekst", name: "label", widget: "string" }
          - label: "Brojke (statistika)"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Broj / godina", name: "num", widget: "string" }
              - { label: "Opis", name: "label", widget: "string" }
          - label: "O nama"
            name: "about"
            widget: "object"
            fields:
              - { label: "Uvodna rečenica", name: "intro", widget: "text" }
              - { label: "Misija", name: "mission", widget: "text" }
              - { label: "Vizija", name: "vision", widget: "text" }
              - label: "Kome je KORAK namijenjen (popis)"
                name: "audience"
                widget: "list"
          - label: "Programi"
            name: "programs"
            widget: "list"
            fields:
              - { label: "Ikona (emoji)", name: "icon", widget: "string" }
              - { label: "Naslov", name: "title", widget: "string" }
              - { label: "Opis", name: "desc", widget: "text" }
          - label: "Projekti"
            name: "projects"
            widget: "list"
            fields:
              - label: "Vizualni identitet"
                name: "brand"
                widget: "select"
                options:
                  - { label: "Opći KORAK identitet", value: "default" }
                  - { label: "Vlastiti identitet (Korak u sigurnost)", value: "sigurnost" }
                default: "default"
              - { label: "Oznaka (kratka riječ, npr. ODRŽIVOST)", name: "tag", widget: "string" }
              - { label: "Naslov projekta", name: "title", widget: "string" }
              - { label: "Opis", name: "desc", widget: "text" }
              - { label: "Tekst uz logo (samo za 'sigurnost')", name: "badge", widget: "string", required: false }
          - label: "Partneri (popis)"
            name: "partners"
            widget: "list"
          - label: "Kontakt"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Adresa — redak 1", name: "address_line1", widget: "string" }
              - { label: "Adresa — redak 2", name: "address_line2", widget: "string" }
              - { label: "E-mail", name: "email", widget: "string" }
              - { label: "Telefon", name: "phone", widget: "string" }
              - { label: "Predsjednik udruge", name: "president", widget: "string" }
              - { label: "Voditeljica projekata", name: "project_lead", widget: "string", required: false }
      - file: "content/projects.json"
        label: "Podstranica Projekti (projekti.html)"
        name: "projects_page"
        fields:
          - label: "Uvod (vrh stranice)"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Značka iznad naslova", name: "eyebrow", widget: "string" }
              - { label: "Naslov — 1. redak", name: "title_line1", widget: "string" }
              - { label: "Naslov — 2. redak (zelena boja)", name: "title_line2", widget: "string" }
              - { label: "Uvodni tekst", name: "lead", widget: "text" }
          - label: "Glavni projekt (flagship)"
            name: "flagship"
            widget: "object"
            fields:
              - { label: "Oznaka (program, razdoblje)", name: "tag", widget: "string" }
              - { label: "Naslov", name: "title", widget: "string" }
              - { label: "Istaknuta rečenica", name: "lead", widget: "text" }
              - { label: "Opis", name: "desc", widget: "text" }
              - { label: "Partneri", name: "partners", widget: "string" }
              - { label: "Vrijednost", name: "value", widget: "string" }
              - { label: "Naslov popisa rezultata", name: "results_title", widget: "string" }
              - label: "Rezultati (popis)"
                name: "results"
                widget: "list"
          - { label: "Naslov vremenske crte", name: "timeline_title", widget: "string" }
          - { label: "Podnaslov vremenske crte", name: "timeline_sub", widget: "string" }
          - { label: "Napomena o iznosima (disclaimer)", name: "disclaimer", widget: "text" }
          - label: "Projekti na vremenskoj crti"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Godina / razdoblje", name: "year", widget: "string" }
              - { label: "Naziv projekta", name: "title", widget: "string" }
              - { label: "Program / financijer", name: "program", widget: "string" }
              - { label: "Iznos granta", name: "amount", widget: "string" }
              - { label: "Uloga (Koordinator / Partner...)", name: "role", widget: "string" }
              - { label: "Status (npr. 'u provedbi', prazno = završen)", name: "status", widget: "string", required: false, default: "" }
              - { label: "Opis", name: "desc", widget: "text" }
          - { label: "Naslov sekcije 'u pripremi'", name: "pipeline_title", widget: "string" }
          - { label: "Podnaslov sekcije 'u pripremi'", name: "pipeline_sub", widget: "string" }
          - label: "Projekti u pripremi (NE odobreni!)"
            name: "pipeline"
            widget: "list"
            fields:
              - { label: "Naziv", name: "title", widget: "string" }
              - { label: "Program", name: "program", widget: "string" }
              - { label: "Opis", name: "desc", widget: "text" }
